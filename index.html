<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>כאן התוכן שלך</title>
    <meta name="description" content="כאן התוכן שלך" />

    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --card: #111a2e;
        --text: #e8eefc;
        --muted: #a8b3cf;
        --accent: #6ea8fe;
        --border: rgba(255, 255, 255, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 600px at 80% 10%, rgba(110,168,254,0.25), transparent),
                    radial-gradient(900px 500px at 10% 30%, rgba(110,168,254,0.18), transparent),
                    var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      header {
        max-width: 980px;
        margin: 48px auto 0;
        padding: 0 20px;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
      }

      .card {
        background: color-mix(in srgb, var(--card) 92%, black 8%);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        backdrop-filter: blur(6px);
      }

      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 8px 0; color: var(--muted); }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--border);
        background: rgba(110,168,254,0.18);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
      }

      .btn:hover { border-color: rgba(110,168,254,0.45); }

      form { display: grid; gap: 10px; }

      label { font-weight: 600; font-size: 14px; }

      input, textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        outline: none;
      }

      input:focus, textarea:focus {
        border-color: rgba(110,168,254,0.55);
        box-shadow: 0 0 0 3px rgba(110,168,254,0.15);
      }

      footer {
        max-width: 980px;
        margin: 12px auto 40px;
        padding: 0 20px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 860px) {
        .container { grid-template-columns: 1fr; }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>כאן התוכן שלך</h1>
      <p>תבנית HTML בסיסית עם כרטיסים, כפתור וטופס. החלף/י את הטקסטים לפי הצורך.</p>
    </header>

    <main class="container">
      <section class="card" aria-label="תוכן ראשי">
        <h2>כאן התוכן שלך</h2>
        <p>כאן התוכן שלך</p>

        <a class="btn" href="#" role="button">כאן התוכן שלך</a>
      </section>

      <aside class="card" aria-label="טופס">
        <h2>צור/י קשר</h2>

        <form id="contactForm" novalidate>
          <div>
            <label for="email">אימייל</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div>
            <label for="message">הודעה</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button class="btn" type="submit">שליחה</button>
          <p id="status" role="status" aria-live="polite"></p>
        </form>
      </aside>
    </main>

    <footer>
      <span>כאן התוכן שלך</span>
    </footer>

    <script>
      (function () {
        /** @type {HTMLFormElement | null} */
        const form = document.getElementById('contactForm');
        /** @type {HTMLElement | null} */
        const status = document.getElementById('status');

        if (!form || !status) return;

        form.addEventListener('submit', (e) => {
          e.preventDefault();

          const formData = new FormData(form);
          const email = String(formData.get('email') || '').trim();
          const message = String(formData.get('message') || '').trim();

          if (!email || !message) {
            status.textContent = 'כאן התוכן שלך';
            return;
          }

          // כאן בדרך כלל שולחים לשרת (fetch) — כרגע רק הדגמה.
          status.textContent = 'כאן התוכן שלך';
          form.reset();
        });
      })();
    </script>
  </body>
</html>
